<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkout — Games Planet</title><link rel="stylesheet" href="store.css"></head><body>
<header class="topbar"><div class="header"><a class="brand" href="index.html">Games<span>Planet</span><small class="tag">Secure order pre-fill</small></a><div style="flex:1"></div><a class="cart-link" href="cart.html">🛒 <span>Cart</span> <b data-cart-count>0</b></a></div></header>
<h1 class="page-title">Review and Place Your Order</h1><main class="checkout-layout"><section class="panel"><h2>Delivery details</h2><form id="checkoutForm"><div class="form-grid">
<div class="field"><label for="name">Full name *</label><input id="name" required autocomplete="name"></div><div class="field"><label for="mobile">Mobile number *</label><input id="mobile" required inputmode="numeric" maxlength="10"></div>
<div class="field"><label for="alt">Alternate number</label><input id="alt" inputmode="numeric" maxlength="10"></div><div class="field"><label for="email">Email</label><input id="email" type="email" autocomplete="email"></div>
<div class="field"><label for="house">House / Shop number *</label><input id="house" required></div><div class="field"><label for="landmark">Landmark</label><input id="landmark"></div>
<div class="field full"><label for="address">Complete address *</label><textarea id="address" required></textarea></div><div class="field"><label for="pincode">PIN code *</label><input id="pincode" required inputmode="numeric" maxlength="6"></div><div class="field"><label for="state">State *</label><input id="state" required></div>
<div class="field"><label for="city">City / District *</label><input id="city" required></div><div class="field"><label for="postoffice">Post Office</label><select id="postoffice"><option value="">Select after PIN code</option></select></div></div>
<h2>Delivery method</h2><div id="batteryNote" class="note" hidden>Due battery Item selected no Air or Prime delivery available.</div><div class="delivery-options" id="deliveryOptions">
<label class="delivery-option"><input type="radio" name="delivery" value="surface" checked><span><b>Surface Delivery</b><br><small>Economical road delivery</small></span></label>
<label class="delivery-option" data-fast><input type="radio" name="delivery" value="air"><span><b>Air Delivery</b><br><small>Faster air shipment</small></span></label>
<label class="delivery-option" data-fast><input type="radio" name="delivery" value="prime"><span><b>Prime Delivery</b><br><small>Priority handling</small></span></label></div>
<div class="field" style="margin-top:14px"><label for="courier">Courier</label><select id="courier"></select></div></form></section>
<aside class="panel summary"><h2>Your order</h2><div class="checkout-items" id="checkoutItems"></div><div class="summary-row"><span>Products</span><b id="productTotal">₹0</b></div><div class="summary-row"><span>Chargeable weight</span><b id="weight">0 kg</b></div><div class="summary-row"><span>Delivery</span><b id="deliveryCharge">₹0</b></div><hr><div class="summary-row" style="font-size:20px"><span>Order total</span><b id="grandTotal">₹0</b></div><button class="order-btn" id="upiBtn" type="button">Pay with UPI</button><button class="order-btn whatsapp" id="whatsappBtn" type="button">Send Order on WhatsApp</button><p style="font-size:12px;color:#687078">Please review quantity and address before continuing.</p></aside></main>
<script src="products.js"></script><script src="checkout.js"></script></body></html>
